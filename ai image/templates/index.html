<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical Image Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-6">

    <!-- Header -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-700">🧠 AI Medical Image Diagnosis Agent</h1>
        <p class="text-gray-500 mt-2">Upload scans and get AI-powered insights</p>
    </div>

    <!-- Form -->
    <form method="POST" enctype="multipart/form-data" class="space-y-5">

        <!-- API Key -->
        <div>
            <label class="font-semibold text-gray-700">Groq API Key</label>
            <input type="password" name="groq_api_key" required
                class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <!-- Drag & Drop Upload -->
        <div id="drop-area" class="border-2 border-dashed border-indigo-300 rounded-xl p-6 text-center cursor-pointer hover:bg-indigo-50">
            <input type="file" name="image" id="fileInput" accept="image/png,image/jpeg,.dcm" hidden required>
            <p class="text-gray-600">Drag & Drop or Click to Upload</p>
            <p class="text-sm text-gray-400 mt-1">PNG, JPG, JPEG, DICOM</p>
        </div>

        <!-- Preview -->
        <div id="preview-container" class="hidden">
            <p class="text-sm text-gray-500 mb-2">Preview:</p>
            <img id="preview" class="rounded-lg max-h-60 mx-auto shadow">
        </div>

        <!-- Submit -->
        <button id="submitBtn" type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
            Analyze Image
        </button>

    </form>

    <!-- Error -->
    {% if error %}
    <div class="mt-6 bg-red-100 text-red-700 p-3 rounded-lg">
        {{ error }}
    </div>
    {% endif %}

    <!-- Result -->
    {% if result_html %}
    <div class="mt-6 bg-gray-50 p-4 rounded-lg shadow-inner">
        <h2 class="text-lg font-semibold mb-2 text-indigo-600">Analysis Result</h2>
        <div class="prose max-w-none">
            {{ result_html|safe }}
        </div>
    </div>
    {% endif %}

</div>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const previewContainer = document.getElementById("preview-container");

// Click to upload
dropArea.addEventListener("click", () => fileInput.click());

// Drag events
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("bg-indigo-100");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("bg-indigo-100");
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("bg-indigo-100");

    const file = e.dataTransfer.files[0];
    fileInput.files = e.dataTransfer.files;
    showPreview(file);
});

// Preview image
fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    showPreview(file);
});

function showPreview(file) {
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        preview.src = e.target.result;
        previewContainer.classList.remove("hidden");
    };
    reader.readAsDataURL(file);
}

// Loading state
document.querySelector("form").addEventListener("submit", () => {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Analyzing...";
    btn.disabled = true;
});
</script>

</body>
</html>
